name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Linting dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Run Linter (Syntax Check)
      run: |
        # Flake8 will now automatically read the .flake8 file we just created
        flake8 .