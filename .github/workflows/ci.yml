name: Continuous Integration

on:
  push:
    branches: [ main, data-ingestion ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    # 1. Spin up the test infrastructure inside the GitHub Runner
    environment:
      name: testing
    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_USER: ${{secrets.DB_USERNAME}}
          POSTGRES_PASSWORD: ${{secrets.DB_PASSWORD}}
          POSTGRES_DB: telestream_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Linting dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Run Linter (Syntax Check)
      run: |
        # Flake8 will now automatically read the .flake8 file we just created
        flake8 .
    
    # 2. Automatically test the structural integrity of your migrations
    - name: Test Database Migrations
      env:
        DATABASE_URL: postgresql+asyncpg://${{ secrets.DB_USERNAME }}:${{ secrets.DB_PASSWORD }}@localhost:5432/telestream_test
        REDIS_URL: redis://localhost:6379/0
        SECRET_KEY: ${{ secrets.APP_SECRET_KEY }}
      run: |
        alembic upgrade head